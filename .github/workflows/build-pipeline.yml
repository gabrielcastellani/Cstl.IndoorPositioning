name: Build-Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore
      run: dotnet restore Cstl.IndoorPositioning.slnx
      
    - name: Build
      run: dotnet build Cstl.IndoorPositioning.slnx --no-restore --configuration Release
      
    - name: Test
      run: dotnet test Cstl.IndoorPositioning.slnx --no-build --configuration Release --logger "trx;LogFileName=results.trx"

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: "**/results.trx"
